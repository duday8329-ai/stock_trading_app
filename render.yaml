services:
  - type: web
    name: sb-stocks
    runtime: docker
    plan: free
    region: singapore
    branch: main
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.17.1
      - key: COREPACK_INTEGRITY_KEYS
        value: "0"
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FINNHUB_API_KEY
        sync: false
      - key: STARTING_CASH
        value: "100000"
      - key: MARKET_CACHE_TTL_SECONDS
        value: "45"
