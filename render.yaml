services:
  - type: web
    name: sb-stocks
    runtime: node
    plan: free
    region: singapore
    branch: main
    buildCommand: corepack enable && corepack prepare pnpm@10.17.1 --activate && pnpm install --no-frozen-lockfile --prod=false && pnpm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.18.1
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FINNHUB_API_KEY
        sync: false
      - key: STARTING_CASH
        value: "100000"
      - key: MARKET_CACHE_TTL_SECONDS
        value: "45"
