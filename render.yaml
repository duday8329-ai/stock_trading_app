services:
  - type: web
    name: sb-stocks
    runtime: node
    plan: free
    region: singapore
    branch: main
    buildCommand: npm install --omit=dev --prefix server && npm install --include=dev --prefix client && npm run build --prefix client
    startCommand: npm run start --prefix server
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.18.1
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FINNHUB_API_KEY
        sync: false
      - key: STARTING_CASH
        value: "100000"
      - key: MARKET_CACHE_TTL_SECONDS
        value: "45"
